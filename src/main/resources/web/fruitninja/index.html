<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Fruit Ninja Local</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #111 url('assets/background.png') no-repeat center center; background-size: 100% 100%; width: 100%; height: 100%; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        
        .score-container {
            position: absolute;
            top: 30px;
            left: 80px;
            font-size: 40px;
            font-weight: bold;
            color: #f7b13f;
            text-shadow: 2px 2px 0 #522703, -1px -1px 0 #522703, 1px -1px 0 #522703, -1px 1px 0 #522703, 1px 1px 0 #522703;
        }
        
        .score-icon {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 50px;
        }

        .lives-icon {
            position: absolute;
            top: 20px;
            right: 30px;
            height: 40px;
        }

        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 64px;
            font-weight: bold;
            color: red;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui-layer">
        <img src="assets/score.png" class="score-icon">
        <div class="score-container"><span id="scoreDisplay">0</span></div>
        <img src="assets/xxxf.png" class="lives-icon" id="livesDisplay">
        <div id="game-over">GAME OVER<br><span style="font-size: 24px; color: white;">等待重新开始...</span></div>
    </div>
    
    <script>
        // Redirect console.log to Java if available
        const originalLog = console.log;
        console.log = function(...args) {
            originalLog.apply(console, args);
            if (window.javaBackend && window.javaBackend.log) {
                window.javaBackend.log(args.join(' '));
            }
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let w = canvas.width = window.innerWidth;
        let h = canvas.height = window.innerHeight;

        const scoreDisplay = document.getElementById('scoreDisplay');
        const livesDisplay = document.getElementById('livesDisplay');
        const gameOverDisplay = document.getElementById('game-over');

        let score = 0;
        let lives = 1;
        let isGameOver = false;
        let isLevelComplete = false;
        let scoreTarget = 0;   // 0 = endless mode
        let gameMode = 'normal'; // easy/normal/hard/endless

        // --- Background ---
        const bgImg = new Image();
        bgImg.src = 'assets/background.png';

        // --- Error Capture ---
        window.onerror = function(msg, url, line, col, err) {
            console.log("JS Error:", msg, "Line:", line);
            gameOverDisplay.style.display = 'block';
            gameOverDisplay.innerHTML = `<span style="color:red;font-size:20px">前端脚本错误:<br>${msg}<br>Line: ${line}</span>`;
        };

        // --- Audio ---
        function playSound(name) {
            try {
                let snd = new Audio(`assets/${name}.mp3`);
                snd.play();
            } catch(e) {
                console.log("Audio play error: " + e);
            }
        }

        // --- Game Entities ---
        const FRUIT_TYPES = ['apple', 'banana', 'basaha', 'peach', 'sandia'];
        const FRUIT_COLORS = {
            'apple': '#00ff66',  // 青苹果/猕猴桃：赛博荧光绿
            'banana': '#ffe600', // 香蕉/菠萝：亮霓虹黄
            'basaha': '#ff2a5f', // 草莓：霓虹红
            'peach': '#ff7700',  // 橙子/桃子：亮橙
            'sandia': '#ff2a5f'  // 西瓜：霓虹红
        };
        const IMAGES = {};
        
        // Load images
        FRUIT_TYPES.forEach(type => {
            IMAGES[type] = new Image(); IMAGES[type].src = `assets/${type}.png`;
            IMAGES[type + '-1'] = new Image(); IMAGES[type + '-1'].src = `assets/${type}-1.png`;
            IMAGES[type + '-2'] = new Image(); IMAGES[type + '-2'].src = `assets/${type}-2.png`;
        });
        IMAGES['boom'] = new Image(); IMAGES['boom'].src = 'assets/boom.png';
        IMAGES['flash'] = new Image(); IMAGES['flash'].src = 'assets/flash.png';
        IMAGES['smoke'] = new Image(); IMAGES['smoke'].src = 'assets/smoke.png';

        // --- Screen Flash for Bomb ---
        let screenFlashAlpha = 0;

        const fruits = [];
        const particles = [];
        const trailHistory = [];
        const juiceStains = []; // 沾染在背景上的果汁
        const shockwaves = [];  // 环境扩散冲击波
        const gridParticles = []; // 底部透视网格升腾微粒
        const maxHistoryLength = 15;

        // JS 端暴露的 resetGame 方法，供 Java 端在重新进入游戏时调用
        window.resetGame = function(mode, livesCount) {
            score = 0;
            gameMode = mode || 'normal';
            isGameOver = false;
            isLevelComplete = false;
            fruits.length = 0;
            particles.length = 0;
            trailHistory.length = 0;
            juiceStains.length = 0;
            shockwaves.length = 0;
            gridParticles.length = 0;
            screenFlashAlpha = 0;

            if (gameMode === 'endless') {
                lives = livesCount || 3;
                scoreTarget = 0;
            } else if (gameMode === 'hard') {
                lives = 1;
                scoreTarget = 300;
            } else if (gameMode === 'normal') {
                lives = 1;
                scoreTarget = 200;
            } else {
                lives = 1;
                scoreTarget = 100;
            }

            updateHUD();
            gameOverDisplay.style.display = 'none';
            window.removeEventListener('mousedown', exitGame);

            // 重新开始产生水果
            clearTimeout(spawnTimeout);
            spawnTimeout = setTimeout(spawnWave, 1000);
        };

        let spawnTimeout;
        function spawnWave() {
            if (isGameOver) return;
            playSound('throw');
            const count = Math.floor(Math.random() * 3) + 2;
            for(let i=0; i<count; i++) {
                const isBomb = Math.random() < 0.15;
                const type = isBomb ? 'boom' : FRUIT_TYPES[Math.floor(Math.random() * FRUIT_TYPES.length)];
                
                fruits.push({
                    type: type,
                    x: w * 0.2 + Math.random() * (w * 0.6),
                    y: h + 100,
                    vx: (Math.random() - 0.5) * 8,
                    vy: -20 - Math.random() * 5,
                    radius: 40,
                    isBomb: isBomb,
                    sliced: false,
                    rotation: 0,
                    rotSpeed: (Math.random() - 0.5) * 0.1
                });
            }
            spawnTimeout = setTimeout(spawnWave, 1500 + Math.random() * 2000);
        }
        
        spawnTimeout = setTimeout(spawnWave, 1000);

        // --- Input Handling ---
        let isHandDetected = false;
        let targetHandX = -1;
        let targetHandY = -1;
        let currentHandX = -1;
        let currentHandY = -1;

        window.addEventListener('mousemove', (e) => {
            if (isGameOver) return;
            isHandDetected = true;
            targetHandX = e.clientX;
            targetHandY = e.clientY;
            if (currentHandX === -1) {
                currentHandX = targetHandX;
                currentHandY = targetHandY;
            }
        });

        window.updateHandPosition = function(x, y, isDetected) {
            if (isGameOver) return;
            isHandDetected = isDetected;
            if (isDetected) {
                targetHandX = x * w;
                targetHandY = y * h;
                if (currentHandX === -1) {
                    currentHandX = targetHandX;
                    currentHandY = targetHandY;
                }
            } else {
                trailHistory.length = 0;
                currentHandX = -1;
                targetHandX = -1;
            }
        };

        function distToSegment(px, py, vx, vy, wx, wy) {
            const l2 = (vx - wx) ** 2 + (vy - wy) ** 2;
            if (l2 === 0) return Math.hypot(px - vx, py - vy);
            let t = ((px - vx) * (wx - vx) + (py - vy) * (wy - vy)) / l2;
            t = Math.max(0, Math.min(1, t));
            return Math.hypot(px - (vx + t * (wx - vx)), py - (vy + t * (wy - wy)));
        }

        function checkSlices() {
            if (trailHistory.length < 2) return;
            const p1 = trailHistory[trailHistory.length - 2];
            const p2 = trailHistory[trailHistory.length - 1];
            
            const speed = Math.hypot(p2.x - p1.x, p2.y - p1.y);
            if (speed < 2) return; // 降低速度阈值，兼容高帧率下每帧移动距离小的情况

            // 计算刀光切入角度，用于决定水果切开后两半的旋转和分离方向
            const sliceAngle = Math.atan2(p2.y - p1.y, p2.x - p1.x);

            for (let i = fruits.length - 1; i >= 0; i--) {
                const f = fruits[i];
                if (f.sliced) continue;
                const d = distToSegment(f.x, f.y, p1.x, p1.y, p2.x, p2.y);
                if (d < f.radius) {
                    f.sliced = true;
                    sliceFruit(f, i, sliceAngle);
                }
            }
        }

        function createJuice(x, y, color, sliceAngle) {
            if (!color) return;
            // 创建飞溅的果汁粒子，增强爆发感
            for(let i=0; i<15; i++) {
                const dir = sliceAngle + (Math.random() - 0.5) * Math.PI; // 沿切击方向散开
                const speed = Math.random() * 25 + 10;
                const life = 0.5 + Math.random() * 0.5;
                particles.push({
                    type: 'juice',
                    x: x, y: y,
                    vx: Math.cos(dir) * speed,
                    vy: Math.sin(dir) * speed,
                    radius: Math.random() * 6 + 2,
                    color: color,
                    life: life,
                    maxLife: life,
                    decay: 0.03
                });
            }
            // 创建背景沾染（果汁滴）
            juiceStains.push({
                x: x, y: y,
                color: color,
                radius: Math.random() * 15 + 30, // 增加果汁印记大小
                angle: sliceAngle, 
                alpha: 0.85,
                life: 180 // 存活帧数（60帧/秒，约 3 秒）
            });
        }

        function sliceFruit(f, index, sliceAngle) {
            fruits.splice(index, 1);

            // 触发切中处青色环境冲击波
            shockwaves.push({ x: f.x, y: f.y, radius: 0, life: 1.0, color: '#00ffff' });

            if (f.isBomb) {
                playSound('boom');
                screenFlashAlpha = 1.0;

                // 炸弹爆炸黑烟
                particles.push({
                    type: 'smoke',
                    x: f.x, y: f.y,
                    vx: 0, vy: 0,
                    rotation: Math.random() * Math.PI * 2, rotSpeed: 0,
                    life: 1.0,
                    maxLife: 1.0,
                    scale: 2.5,
                    isFlash: true
                });

                if (gameMode === 'endless') {
                    lives--;
                    updateHUD();
                    if (lives <= 0) endGame();
                } else {
                    // 非无尽模式：碰炸弹直接结束
                    endGame();
                }
            } else {
                playSound('splatter');
                score += 10;
                updateHUD();

                // 非无尽模式：检查是否通关
                if (gameMode !== 'endless' && scoreTarget > 0 && score >= scoreTarget && !isGameOver) {
                    isLevelComplete = true;
                    isGameOver = true;
                    gameOverDisplay.style.display = 'block';
                    gameOverDisplay.innerHTML = '<span style="color:#f7b13f;font-size:48px">🎉 通关！</span><br><span style="font-size:24px;color:white">得分: ' + score + '</span>';
                    window.addEventListener('mousedown', exitGame);
                    setTimeout(exitGame, 3000);
                }
                
                // 根据刀光角度，计算垂直方向作为水果分离方向
                const apartAngle = sliceAngle + Math.PI / 2;
                const speedSpread = 5;
                const spreadX = Math.cos(apartAngle) * speedSpread;
                const spreadY = Math.sin(apartAngle) * speedSpread;
                
                // 左半边/上边
                particles.push({
                    type: f.type + '-1',
                    x: f.x - spreadX * 3, y: f.y - spreadY * 3,
                    vx: f.vx - spreadX, vy: f.vy - spreadY,
                    rotation: f.rotation, rotSpeed: f.rotSpeed - 0.1,
                    life: 2.0, maxLife: 2.0
                });
                // 右半边/下边
                particles.push({
                    type: f.type + '-2',
                    x: f.x + spreadX * 3, y: f.y + spreadY * 3,
                    vx: f.vx + spreadX, vy: f.vy + spreadY,
                    rotation: f.rotation, rotSpeed: f.rotSpeed + 0.1,
                    life: 2.0, maxLife: 2.0
                });
                
                // 切击刀光特效 (flash.png)，旋转角度对齐刀光
                particles.push({
                    type: 'flash',
                    x: f.x, y: f.y,
                    vx: 0, vy: 0,
                    rotation: sliceAngle, rotSpeed: 0,
                    life: 0.3, maxLife: 0.3,
                    scale: 1.0,
                    isFlash: true
                });
                
                // 生成果汁
                createJuice(f.x, f.y, FRUIT_COLORS[f.type], sliceAngle);

                // 青色星芒粒子 (Cyan Starburst)
                for (let j = 0; j < 30; j++) {
                    const dir = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 20 + 5;
                    particles.push({
                        type: 'cyan-starburst',
                        x: f.x,
                        y: f.y,
                        vx: Math.cos(dir) * speed,
                        vy: Math.sin(dir) * speed,
                        radius: Math.random() * 4 + 2,
                        color: '#00ffff',
                        life: 0.5 + Math.random() * 0.5,
                        maxLife: 1.0,
                        decay: 0.05
                    });
                }

                // 生成赛博故障像素块 (Glitch Cubes)
                for (let j = 0; j < 10; j++) {
                    particles.push({
                        type: 'glitch-cube',
                        x: f.x + (Math.random() - 0.5) * 60,
                        y: f.y + (Math.random() - 0.5) * 60,
                        vx: (Math.random() - 0.5) * 15,
                        vy: (Math.random() - 0.5) * 15,
                        radius: Math.random() * 8 + 4,
                        color: Math.random() > 0.5 ? '#00f0ff' : '#9d00ff',
                        life: 0.5 + Math.random() * 0.5,
                        maxLife: 1.0,
                        rotation: Math.random() * Math.PI,
                        rotSpeed: (Math.random() - 0.5) * 0.2
                    });
                }

                // 生成闪电电弧 (Lightning Arcs)
                for (let j = 0; j < 5; j++) {
                    particles.push({
                        type: 'lightning',
                        x: f.x,
                        y: f.y,
                        angle: Math.random() * Math.PI * 2,
                        length: 50 + Math.random() * 60,
                        life: 0.2 + Math.random() * 0.2,
                        maxLife: 0.4
                    });
                }
            }
        }

        function updateHUD() {
            if (gameMode === 'endless') {
                scoreDisplay.innerText = score;
            } else {
                scoreDisplay.innerText = score + ' / ' + scoreTarget;
            }
            if (gameMode === 'endless') {
                let livesImg = 'xxxf.png';
                if (lives === 2) livesImg = 'xxf.png';
                if (lives === 1) livesImg = 'xf.png';
                if (lives <= 0) livesImg = 'x.png';
                livesDisplay.src = `assets/${livesImg}`;
            } else {
                // 非无尽模式：不显示生命，显示炸弹警告
                livesDisplay.style.display = 'none';
            }
            if (window.javaBackend) window.javaBackend.updateScore(score);
        }

        function endGame() {
            isGameOver = true;
            playSound('over');
            gameOverDisplay.style.display = 'block';
            window.addEventListener('mousedown', exitGame);
            setTimeout(exitGame, 3000);
        }

        function exitGame() {
            if (window.javaBackend) {
                window.javaBackend.saveScore(score);
            }
        }

        // --- Render Loop ---
        let lastTime = performance.now ? performance.now() : Date.now();
        function loop(time) {
            requestAnimationFrame(loop);
            const currentTime = time || (performance.now ? performance.now() : Date.now());
            const delta = (currentTime - lastTime) / 16.66; // approx 60fps multiplier
            lastTime = currentTime;

            // Clear old trail history naturally based on time
            const now = Date.now();
            while (trailHistory.length > 0 && now - trailHistory[0].time > 150) {
                trailHistory.shift();
            }

            // Lerp hand position for ultra-smooth 60fps trails regardless of camera FPS
            if (isHandDetected && currentHandX !== -1) {
                currentHandX += (targetHandX - currentHandX) * 0.4;
                currentHandY += (targetHandY - currentHandY) * 0.4;

                if (trailHistory.length > 0) {
                    const lastPt = trailHistory[trailHistory.length - 1];
                    const dist = Math.hypot(currentHandX - lastPt.x, currentHandY - lastPt.y);
                    if (dist >= 10) {
                        trailHistory.push({ x: currentHandX, y: currentHandY, time: now });
                        if (trailHistory.length > maxHistoryLength) trailHistory.shift();
                        checkSlices();
                    } else {
                        // 距离不够时不更新 lastPt 的坐标，只更新时间！
                        // 这样累计移动距离达到阈值后才会真正生成一个新的拖尾节点，避免静止点堆积和长线断裂
                        lastPt.time = now;
                    }
                } else {
                    trailHistory.push({ x: currentHandX, y: currentHandY, time: now });
                }
            }

            // Clear screen
            ctx.clearRect(0, 0, w, h);

            // --- Environmental VFX: Core Pulse, Shockwaves, Grid Particles ---
            const coreX = w * 0.5;
            const coreY = h * 0.4;

            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            
            // 呼吸能量脉冲 (Breathing Energy Pulse)
            const pulseRadius = 150 + Math.sin(Date.now() * 0.003) * 20;
            const coreGrad = ctx.createRadialGradient(coreX, coreY, 0, coreX, coreY, pulseRadius);
            coreGrad.addColorStop(0, 'rgba(157, 0, 255, 0.5)');
            coreGrad.addColorStop(0.5, 'rgba(157, 0, 255, 0.1)');
            coreGrad.addColorStop(1, 'rgba(157, 0, 255, 0)');
            ctx.fillStyle = coreGrad;
            ctx.beginPath();
            ctx.arc(coreX, coreY, pulseRadius, 0, Math.PI * 2);
            ctx.fill();

            // 扩散冲击波 (Shockwaves)
            for (let i = shockwaves.length - 1; i >= 0; i--) {
                let sw = shockwaves[i];
                sw.radius += 25 * delta;
                sw.life -= 0.03 * delta;
                if (sw.life <= 0) {
                    shockwaves.splice(i, 1);
                    continue;
                }
                let cx = sw.x !== undefined ? sw.x : coreX;
                let cy = sw.y !== undefined ? sw.y : coreY;
                ctx.strokeStyle = sw.color ? sw.color : `rgba(157, 0, 255, ${sw.life})`;
                if (sw.color) ctx.globalAlpha = sw.life;
                ctx.lineWidth = 6 * sw.life;
                ctx.beginPath();
                ctx.arc(cx, cy, sw.radius, 0, Math.PI * 2);
                ctx.stroke();
                ctx.globalAlpha = 1.0;
            }

            // 底部网格发光微粒 (Grid Particles)
            while (gridParticles.length < 20) {
                gridParticles.push({
                    x: Math.random() * w,
                    y: h - Math.random() * 200,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: -1 - Math.random() * 2,
                    size: Math.random() * 3 + 1.5,
                    life: Math.random(),
                    color: Math.random() > 0.5 ? '#00f0ff' : '#9d00ff'
                });
            }
            for (let p of gridParticles) {
                p.x += p.vx * delta;
                p.y += p.vy * delta;
                p.life -= 0.005 * delta;
                if (p.life <= 0 || p.y < h - 300) {
                    p.y = h;
                    p.x = Math.random() * w;
                    p.life = 1.0;
                }
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            }
            ctx.restore();

            // Draw screen flash if active (e.g., from bomb)
            if (screenFlashAlpha > 0) {
                ctx.save();
                ctx.fillStyle = `rgba(255, 255, 255, ${screenFlashAlpha})`;
                ctx.fillRect(0, 0, w, h);
                ctx.restore();
                screenFlashAlpha -= 0.02 * delta; // fade out slowly
            }

            // Draw juice stains on background (零延迟精确绘制)
            for (let i = juiceStains.length - 1; i >= 0; i--) {
                let s = juiceStains[i];
                
                ctx.save();
                ctx.globalAlpha = s.alpha;
                // 赛博边缘微发光
                ctx.shadowColor = s.color;
                ctx.shadowBlur = 8;
                
                ctx.fillStyle = s.color;
                ctx.translate(s.x, s.y);
                if (s.angle) ctx.rotate(s.angle); // 根据切击角度旋转
                
                // 绘制主液体块
                ctx.beginPath();
                ctx.scale(2.0, 0.5);
                ctx.arc(0, 0, s.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.scale(0.5, 2.0);
                
                // 绘制四周爆溅出来的果汁小点
                let seed = Math.floor(s.x + s.y);
                for(let j=0; j<6; j++) {
                    seed = (seed * 9301 + 49297) % 233280;
                    let rand1 = seed / 233280;
                    seed = (seed * 9301 + 49297) % 233280;
                    let rand2 = seed / 233280;
                    
                    ctx.beginPath();
                    let offsetX = (rand1 - 0.5) * s.radius * 6;
                    let offsetY = (rand2 - 0.5) * s.radius * 2;
                    ctx.arc(offsetX, offsetY, rand1 * s.radius * 0.4, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();

                // 生命周期更新：前 2 秒保持，第 3 秒透明度渐隐
                s.life -= delta;
                if (s.life < 60) {
                    s.alpha = Math.max(0, s.life / 60); // 1秒内淡出
                }
                if (s.life <= 0) {
                    juiceStains.splice(i, 1); // 自动清理释放内存
                }
            }

            // Spawn fruitsDraw and Update Fruits
            for (let i = fruits.length - 1; i >= 0; i--) {
                const f = fruits[i];
                f.vy += 0.4 * delta;
                f.x += f.vx * delta;
                f.y += f.vy * delta;
                f.rotation += f.rotSpeed * delta;

                if (f.y > h + 200) {
                    // 水果掉出屏幕不扣命，直接移除
                    fruits.splice(i, 1);
                    continue;
                }

                ctx.save();
                ctx.translate(f.x, f.y);
                ctx.rotate(f.rotation);

                // --- 赛博能量护盾光环 (Cyber Aura) ---
                if (!f.isBomb) {
                    ctx.save();
                    ctx.strokeStyle = '#00f0ff';
                    ctx.lineWidth = 3;
                    ctx.setLineDash([20, 10, 5, 10]);
                    // 逆向旋转光环
                    ctx.rotate(-Date.now() * 0.003);
                    ctx.beginPath();
                    ctx.arc(0, 0, f.radius + 10, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.restore();

                    // 水果外发光
                    ctx.shadowColor = '#00f0ff';
                    ctx.shadowBlur = 15 + Math.sin(Date.now() * 0.01) * 8;
                }
                
                let img = IMAGES[f.type];
                if (img && img.complete && img.naturalWidth > 0) {
                    ctx.drawImage(img, -img.width/2, -img.height/2);
                }
                ctx.restore();
            }

            // Draw and Update Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx * delta;
                p.y += p.vy * delta;
                if (!p.isFlash && p.type !== 'trail-lightning') {
                    p.vy += 0.5 * delta;
                    if (p.rotSpeed) p.rotation += p.rotSpeed * delta;
                }
                p.life -= (p.decay || 0.02) * delta;

                if (p.life <= 0) {
                    particles.splice(i, 1);
                    continue;
                }

                ctx.save();
                ctx.translate(p.x, p.y);
                if (p.rotation) ctx.rotate(p.rotation);
                
                if (p.type === 'juice') {
                    // Draw juice droplets
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.life / p.maxLife;
                    ctx.beginPath();
                    ctx.arc(0, 0, p.radius * (p.life / p.maxLife), 0, Math.PI * 2);
                    ctx.fill();
                } else if (p.type === 'glitch-cube') {
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.life / p.maxLife;
                    ctx.globalCompositeOperation = 'lighter';
                    ctx.shadowColor = p.color;
                    ctx.shadowBlur = 10;
                    ctx.fillRect(-p.radius, -p.radius, p.radius * 2, p.radius * 2);
                } else if (p.type === 'lightning') {
                    if (p.angle) ctx.rotate(p.angle);
                    ctx.strokeStyle = '#00f0ff';
                    ctx.globalCompositeOperation = 'lighter';
                    ctx.lineWidth = 3 * (p.life / p.maxLife);
                    ctx.shadowColor = '#00f0ff';
                    ctx.shadowBlur = 15;
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    // 闪电折线
                    let segments = 4;
                    let len = p.length / segments;
                    let currentX = 0;
                    let currentY = 0;
                    for (let s = 1; s <= segments; s++) {
                        currentX += len;
                        currentY += (Math.random() - 0.5) * 20;
                        ctx.lineTo(currentX, currentY);
                    }
                    ctx.stroke();
                } else if (p.type === 'plasma-spark' || p.type === 'cyan-starburst') {
                    ctx.globalCompositeOperation = 'lighter';
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.life / p.maxLife;
                    ctx.beginPath();
                    ctx.arc(0, 0, p.radius * (p.life / p.maxLife), 0, Math.PI * 2);
                    ctx.fill();
                } else if (p.type === 'trail-lightning') {
                    ctx.globalCompositeOperation = 'lighter';
                    ctx.strokeStyle = '#80ffff';
                    ctx.lineWidth = 1.5 * (p.life / p.maxLife);
                    ctx.shadowColor = '#00ffff';
                    ctx.shadowBlur = 5;
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.lineTo((Math.random() - 0.5) * 20, (Math.random() - 0.5) * 20);
                    ctx.stroke();
                } else if (p.type === 'flash') {
                    // Flash image stretches out and fades
                    const img = IMAGES['flash'];
                    const scaleX = (1 - (p.life / p.maxLife)) * 3; // stretch along cut
                    const scaleY = (p.life / p.maxLife); // thin out
                    ctx.globalAlpha = p.life / p.maxLife;
                    if (img && img.complete) {
                        ctx.scale(scaleX, scaleY);
                        ctx.drawImage(img, -img.width / 2, -img.height / 2);
                    }
                } else {
                    const img = IMAGES[p.type];
                    if (img && img.complete) {
                        ctx.globalAlpha = p.life / p.maxLife;
                        const scale = p.scale || 1.0;
                        ctx.scale(scale, scale);
                        ctx.drawImage(img, -img.width / 2, -img.height / 2);
                    }
                }
                ctx.restore();
            }

            // Draw Neon Blade Trail (立体赛博青光刃)
            if (trailHistory.length > 1) {
                ctx.save();
                ctx.globalCompositeOperation = 'lighter';
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                // 计算速度用于生成尾焰和电弧
                const head = trailHistory[trailHistory.length - 1];
                const neck = trailHistory[trailHistory.length - 2];
                const dx = head.x - neck.x;
                const dy = head.y - neck.y;
                const speed = Math.sqrt(dx * dx + dy * dy) / delta;

                // 生成尾部青焰与爆裂粒子 (Cyan Flame Trail)
                if (speed > 300) {
                    const dirX = dx / (speed * delta);
                    const dirY = dy / (speed * delta);
                    let sparkCount = Math.min(Math.floor(speed / 100), 25);
                    for(let k = 0; k < sparkCount; k++) {
                        particles.push({
                            type: 'plasma-spark',
                            x: head.x + (Math.random() - 0.5) * 20,
                            y: head.y + (Math.random() - 0.5) * 20,
                            vx: -dirX * (Math.random() * 300 + 100) + (Math.random() - 0.5) * 100,
                            vy: -dirY * (Math.random() * 300 + 100) + (Math.random() - 0.5) * 100,
                            radius: Math.random() * 4 + 2,
                            color: Math.random() > 0.5 ? '#0088cc' : '#00ffff',
                            life: 0.5 + Math.random() * 0.5,
                            maxLife: 1.0,
                            decay: 0.05
                        });
                    }
                    
                    // 生成刀痕两侧能量撕裂电弧 (Lightning Arcs along Trail)
                    if (Math.random() > 0.5) {
                        for(let k = 0; k < 2; k++) {
                            const pIndex = Math.floor(Math.random() * (trailHistory.length - 1));
                            const p1 = trailHistory[pIndex];
                            particles.push({
                                type: 'trail-lightning',
                                x: p1.x, y: p1.y,
                                life: 0.2, maxLife: 0.2
                            });
                        }
                    }
                }

                // 3 层路径实现立体赛博青光刃
                const layers = [
                    { width: 24, color: 'rgba(0, 220, 255, ', alphaMult: 0.2, blur: 20 }, // 第一层（空间能量气浪）
                    { width: 10, color: 'rgba(0, 255, 255, ', alphaMult: 0.8, blur: 12 }, // 第二层（主光刃）
                    { width: 3,  color: 'rgba(255, 255, 255, ', alphaMult: 1.0, blur: 0 }  // 第三层（高能量内芯）
                ];

                layers.forEach(layer => {
                    ctx.beginPath();
                    ctx.moveTo(trailHistory[0].x, trailHistory[0].y);
                    
                    for (let i = 1; i < trailHistory.length - 1; i++) {
                        const p1 = trailHistory[i];
                        const p2 = trailHistory[i + 1];
                        const midX = (p1.x + p2.x) / 2;
                        const midY = (p1.y + p2.y) / 2;
                        ctx.quadraticCurveTo(p1.x, p1.y, midX, midY);
                    }
                    const lastPt = trailHistory[trailHistory.length - 1];
                    ctx.lineTo(lastPt.x, lastPt.y);

                    const grad = ctx.createLinearGradient(
                        trailHistory[0].x, trailHistory[0].y, 
                        lastPt.x, lastPt.y
                    );
                    grad.addColorStop(0, layer.color + '0)');
                    grad.addColorStop(1, layer.color + layer.alphaMult + ')');

                    ctx.lineWidth = layer.width;
                    ctx.strokeStyle = grad;
                    ctx.shadowColor = '#00f0ff';
                    ctx.shadowBlur = layer.blur;
                    ctx.stroke();
                });
                
                ctx.restore();
            }

            // --- CRT 扫描线 (CRT Scanlines) ---
            ctx.fillStyle = 'rgba(0, 0, 0, 0.03)';
            for (let i = 0; i < h; i += 4) {
                ctx.fillRect(0, i, w, 2);
            }
        }

        requestAnimationFrame(loop);

        window.addEventListener('resize', () => {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        });
        
        console.log("Fruit Ninja HTML5 Canvas initialized.");
    </script>
</body>
