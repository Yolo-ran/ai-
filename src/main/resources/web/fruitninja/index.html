<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Fruit Ninja Local</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #111 url('assets/background.png') no-repeat center center; background-size: 100% 100%; width: 100%; height: 100%; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        
        .score-container {
            position: absolute;
            top: 30px;
            left: 80px;
            font-size: 40px;
            font-weight: bold;
            color: #f7b13f;
            text-shadow: 2px 2px 0 #522703, -1px -1px 0 #522703, 1px -1px 0 #522703, -1px 1px 0 #522703, 1px 1px 0 #522703;
        }
        
        .score-icon {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 50px;
        }

        .mode-container {
            position: absolute;
            top: 26px;
            right: 30px;
            padding: 8px 14px;
            border: 1px solid rgba(255,255,255,0.28);
            border-radius: 999px;
            background: rgba(0,0,0,0.42);
            color: rgba(255,255,255,0.9);
            font-size: 16px;
            letter-spacing: 0.08em;
        }

        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 64px;
            font-weight: bold;
            color: red;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui-layer">
        <img src="assets/score.png" class="score-icon">
        <div class="score-container"><span id="scoreDisplay">0</span></div>
        <div class="mode-container" id="modeDisplay">目标 0 / 500</div>
        <div id="game-over">GAME OVER<br><span style="font-size: 24px; color: white;">等待重新开始...</span></div>
    </div>
    
    <script>
        // Redirect console.log to Java if available
        const originalLog = console.log;
        console.log = function(...args) {
            originalLog.apply(console, args);
            if (window.javaBackend && window.javaBackend.log) {
                window.javaBackend.log(args.join(' '));
            }
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let w = canvas.width = window.innerWidth;
        let h = canvas.height = window.innerHeight;

        const scoreDisplay = document.getElementById('scoreDisplay');
        const modeDisplay = document.getElementById('modeDisplay');
        const gameOverDisplay = document.getElementById('game-over');

        let score = 0;
        let isGameOver = false;
        let finalScoreSent = false;
        let finalExitTimeout = 0;
        let difficultyName = 'NORMAL';
        let gameConfig = null;

        const GAME_CONFIGS = {
            EASY: { targetScore: 300, minWave: 2, maxWave: 3, bombChance: 0.05, minDelay: 1700, maxDelay: 2400 },
            NORMAL: { targetScore: 500, minWave: 2, maxWave: 4, bombChance: 0.10, minDelay: 1400, maxDelay: 2100 },
            HARD: { targetScore: 800, minWave: 3, maxWave: 5, bombChance: 0.16, minDelay: 1000, maxDelay: 1600 },
            ENDLESS: { targetScore: 0, minWave: 3, maxWave: 5, bombChance: 0.12, minDelay: 1100, maxDelay: 1800 }
        };
        gameConfig = GAME_CONFIGS.NORMAL;

        // --- Background ---
        const bgImg = new Image();
        bgImg.src = 'assets/background.png';

        // --- Error Capture ---
        window.onerror = function(msg, url, line, col, err) {
            console.log("JS Error:", msg, "Line:", line);
            gameOverDisplay.style.display = 'block';
            gameOverDisplay.innerHTML = `<span style="color:red;font-size:20px">前端脚本错误:<br>${msg}<br>Line: ${line}</span>`;
        };

        // --- Audio ---
        let soundEnabled = true;
        let lastSoundTime = {};
        let activeSounds = [];
        function playSound(name, minGap = 0) {
            if (!soundEnabled) return;
            try {
                const now = Date.now();
                if (minGap > 0 && lastSoundTime[name] && now - lastSoundTime[name] < minGap) return;
                lastSoundTime[name] = now;
                const snd = new Audio(`assets/${name}.mp3`);
                activeSounds.push(snd);
                snd.play().catch(() => {});
                snd.onended = () => { activeSounds = activeSounds.filter(s => s !== snd); };
            } catch(e) {}
        }

        // --- Game Entities ---
        const FRUIT_TYPES = ['apple', 'banana', 'basaha', 'peach', 'sandia'];
        const FRUIT_COLORS = {
            'apple': '#00ff66', 'banana': '#ffe600', 'basaha': '#ff2a5f',
            'peach': '#ff7700', 'sandia': '#ff2a5f'
        };
        const IMAGES = {};
        
        // Load images
        FRUIT_TYPES.forEach(type => {
            IMAGES[type] = new Image(); IMAGES[type].src = `assets/${type}.png`;
            IMAGES[type + '-1'] = new Image(); IMAGES[type + '-1'].src = `assets/${type}-1.png`;
            IMAGES[type + '-2'] = new Image(); IMAGES[type + '-2'].src = `assets/${type}-2.png`;
        });
        IMAGES['boom'] = new Image(); IMAGES['boom'].src = 'assets/boom.png';
        IMAGES['flash'] = new Image(); IMAGES['flash'].src = 'assets/flash.png';
        IMAGES['smoke'] = new Image(); IMAGES['smoke'].src = 'assets/smoke.png';

        // --- Screen Flash for Bomb ---
        let screenFlashAlpha = 0;

        const fruits = [];
        const particles = [];
        const trailHistory = [];
        const juiceStains = [];
        const shockwaves = [];
        const gridParticles = [];
        const maxHistoryLength = 15;
        const MAX_PARTICLES = 240;
        const MAX_JUICE_STAINS = 22;
        let loopRunning = true;
        let animationFrameId = 0;

        function addParticle(particle) {
            if (particles.length >= MAX_PARTICLES) {
                particles.splice(0, particles.length - MAX_PARTICLES + 1);
            }
            particles.push(particle);
        }

        window.configureGame = function(name) {
            const normalized = String(name || 'NORMAL').toUpperCase();
            difficultyName = GAME_CONFIGS[normalized] ? normalized : 'NORMAL';
            gameConfig = GAME_CONFIGS[difficultyName];
            updateHUD();
        };

        // JS 端暴露的 resetGame 方法，供 Java 端在重新进入游戏时调用
        window.resetGame = function(mode) {
            score = 0;
            isGameOver = false;
            finalScoreSent = false;
            if (mode) configureGame(mode);
            fruits.length = 0;
            particles.length = 0;
            trailHistory.length = 0;
            juiceStains.length = 0;
            screenFlashAlpha = 0;
            isHandDetected = false;
            targetHandX = -1;
            targetHandY = -1;
            currentHandX = -1;
            currentHandY = -1;
            lastTime = performance.now ? performance.now() : Date.now();
            updateHUD();
            gameOverDisplay.style.display = 'none';
            window.removeEventListener('mousedown', exitGame);
            clearTimeout(finalExitTimeout);
            
            // 重新开始产生水果
            clearTimeout(spawnTimeout);
            spawnTimeout = setTimeout(spawnWave, 1000);
            if (!loopRunning) {
                loopRunning = true;
                requestAnimationFrame(loop);
            }
        };

        window.stopGame = function() {
            loopRunning = false;
            cancelAnimationFrame(animationFrameId);
            clearTimeout(spawnTimeout);
            clearTimeout(finalExitTimeout);
            soundEnabled = false;
            activeSounds.forEach(a => { a.pause(); a.currentTime = 0; });
            activeSounds = [];
        };

        let spawnTimeout;
        function spawnWave() {
            if (isGameOver) return;
            playSound('throw');
            const count = gameConfig.minWave
                + Math.floor(Math.random() * (gameConfig.maxWave - gameConfig.minWave + 1));
            for(let i=0; i<count; i++) {
                const isBomb = Math.random() < gameConfig.bombChance;
                const type = isBomb ? 'boom' : FRUIT_TYPES[Math.floor(Math.random() * FRUIT_TYPES.length)];
                
                fruits.push({
                    type: type,
                    x: w * 0.2 + Math.random() * (w * 0.6),
                    y: h + 100,
                    vx: (Math.random() - 0.5) * 8,
                    vy: -20 - Math.random() * 5,
                    radius: 40,
                    isBomb: isBomb,
                    sliced: false,
                    rotation: 0,
                    rotSpeed: (Math.random() - 0.5) * 0.1
                });
            }
            spawnTimeout = setTimeout(spawnWave,
                gameConfig.minDelay + Math.random() * (gameConfig.maxDelay - gameConfig.minDelay));
        }
        
        spawnTimeout = setTimeout(spawnWave, 1000);

        // --- Input Handling ---
        let isHandDetected = false;
        let targetHandX = -1;
        let targetHandY = -1;
        let currentHandX = -1;
        let currentHandY = -1;

        window.addEventListener('mousemove', (e) => {
            if (isGameOver) return;
            isHandDetected = true;
            targetHandX = e.clientX;
            targetHandY = e.clientY;
            if (currentHandX === -1) {
                currentHandX = targetHandX;
                currentHandY = targetHandY;
            }
        });

        window.updateHandPosition = function(x, y, isDetected) {
            if (isGameOver) return;
            isHandDetected = isDetected;
            if (isDetected) {
                targetHandX = x * w;
                targetHandY = y * h;
                if (currentHandX === -1) {
                    currentHandX = targetHandX;
                    currentHandY = targetHandY;
                }
            } else {
                trailHistory.length = 0;
                currentHandX = -1;
                targetHandX = -1;
            }
        };

        function distToSegment(px, py, vx, vy, wx, wy) {
            const l2 = (vx - wx) ** 2 + (vy - wy) ** 2;
            if (l2 === 0) return Math.hypot(px - vx, py - vy);
            let t = ((px - vx) * (wx - vx) + (py - vy) * (wy - vy)) / l2;
            t = Math.max(0, Math.min(1, t));
            return Math.hypot(px - (vx + t * (wx - vx)), py - (vy + t * (wy - vy)));
        }

        function checkSlices() {
            if (trailHistory.length < 2) return;
            const p1 = trailHistory[trailHistory.length - 2];
            const p2 = trailHistory[trailHistory.length - 1];
            
            const speed = Math.hypot(p2.x - p1.x, p2.y - p1.y);
            if (speed < 2) return; // 降低速度阈值，兼容高帧率下每帧移动距离小的情况

            // 计算刀光切入角度，用于决定水果切开后两半的旋转和分离方向
            const sliceAngle = Math.atan2(p2.y - p1.y, p2.x - p1.x);

            for (let i = fruits.length - 1; i >= 0; i--) {
                const f = fruits[i];
                if (f.sliced) continue;
                const d = distToSegment(f.x, f.y, p1.x, p1.y, p2.x, p2.y);
                if (d < f.radius) {
                    f.sliced = true;
                    sliceFruit(f, i, sliceAngle);
                }
            }
        }

        function createJuice(x, y, color) {
            if (!color) return;
            // 创建飞溅的果汁粒子
            for(let i=0; i<15; i++) {
                const dir = Math.random() * Math.PI * 2;
                const dist = Math.random() * 200 + 50;
                const life = 1.0;
                addParticle({
                    type: 'juice',
                    x: x, y: y,
                    vx: Math.cos(dir) * 15 * Math.random(),
                    vy: Math.sin(dir) * 15 * Math.random() - 5,
                    radius: Math.random() * 8 + 3,
                    color: color,
                    life: life,
                    maxLife: life
                });
            }
            // 创建背景沾染（果汁滴）
            juiceStains.push({
                x: x, y: y,
                color: color,
                radius: Math.random() * 20 + 20,
                alpha: 0.8,
                time: Date.now()
            });
            if (juiceStains.length > MAX_JUICE_STAINS) {
                juiceStains.splice(0, juiceStains.length - MAX_JUICE_STAINS);
            }
        }

        function sliceFruit(f, index, sliceAngle) {
            fruits.splice(index, 1);
            if (f.isBomb) {
                playSound('boom');

                // 炸弹触发全屏白光
                screenFlashAlpha = 1.0;

                // 炸弹爆炸黑烟
                addParticle({
                    type: 'smoke',
                    x: f.x, y: f.y,
                    vx: 0, vy: 0,
                    rotation: Math.random() * Math.PI * 2, rotSpeed: 0,
                    life: 1.0,
                    maxLife: 1.0,
                    scale: 2.5,
                    isFlash: true // won't fall down
                });

                endGame('bomb');
            } else {
                playSound('splatter', 80);
                score += 10;
                updateHUD();
                
                // 根据刀光角度，计算垂直方向作为水果分离方向
                const apartAngle = sliceAngle + Math.PI / 2;
                const speedSpread = 5;
                const spreadX = Math.cos(apartAngle) * speedSpread;
                const spreadY = Math.sin(apartAngle) * speedSpread;
                
                // 左半边/上边
                addParticle({
                    type: f.type + '-1',
                    x: f.x - spreadX * 3, y: f.y - spreadY * 3,
                    vx: f.vx - spreadX, vy: f.vy - spreadY,
                    rotation: f.rotation, rotSpeed: f.rotSpeed - 0.1,
                    life: 2.0, maxLife: 2.0
                });
                // 右半边/下边
                addParticle({
                    type: f.type + '-2',
                    x: f.x + spreadX * 3, y: f.y + spreadY * 3,
                    vx: f.vx + spreadX, vy: f.vy + spreadY,
                    rotation: f.rotation, rotSpeed: f.rotSpeed + 0.1,
                    life: 2.0, maxLife: 2.0
                });
                
                // 切击刀光特效 (flash.png)，旋转角度对齐刀光
                addParticle({
                    type: 'flash',
                    x: f.x, y: f.y,
                    vx: 0, vy: 0,
                    rotation: sliceAngle, rotSpeed: 0,
                    life: 0.3, maxLife: 0.3,
                    scale: 1.0,
                    isFlash: true
                });
                
                // 冲击波 + 果汁 + 星芒
                shockwaves.push({ x: f.x, y: f.y, radius: 0, life: 1.0, color: '#00ffff' });
                createJuice(f.x, f.y, FRUIT_COLORS[f.type]);
                for (let j = 0; j < 30; j++) {
                    const dir = Math.random() * Math.PI * 2, spd = Math.random() * 20 + 5;
                    addParticle({type: 'cyan-starburst', x: f.x, y: f.y,
                        vx: Math.cos(dir) * spd, vy: Math.sin(dir) * spd,
                        radius: 2, color: '#00f0ff', life: 0.2, maxLife: 0.2, decay: 0.05});
                }
                if (gameConfig.targetScore > 0 && score >= gameConfig.targetScore) {
                    score = gameConfig.targetScore;
                    updateHUD();
                    endGame('target');
                }
            }
        }

        function updateHUD() {
            scoreDisplay.innerText = score;
            modeDisplay.innerText = gameConfig.targetScore > 0
                ? `目标 ${score} / ${gameConfig.targetScore}`
                : `无尽模式  ${score}`;
            if (window.javaBackend) window.javaBackend.updateScore(score);
        }

        function endGame(reason) {
            if (isGameOver) return;
            isGameOver = true;
            clearTimeout(spawnTimeout);
            if (reason !== 'bomb') playSound('over');
            gameOverDisplay.innerHTML = reason === 'bomb'
                ? 'GAME OVER<br><span style="font-size: 22px; color: white;">切到炸弹</span>'
                : 'TARGET CLEAR<br><span style="font-size: 22px; color: white;">目标分数达成</span>';
            gameOverDisplay.innerHTML += '<br><span style="font-size: 18px; color: #f0ca79;">✊ 握拳重玩    🤲 双手握拳退出</span>';
            gameOverDisplay.style.display = 'block';
            window.addEventListener('mousedown', exitGame);
            if (reason === 'bomb') {
                exitGame();
            } else {
                finalExitTimeout = setTimeout(exitGame, 2400);
            }
        }

        function exitGame() {
            if (finalScoreSent) return;
            finalScoreSent = true;
            window.removeEventListener('mousedown', exitGame);
            if (window.javaBackend) {
                window.javaBackend.saveScore(score);
            }
        }

        // --- Render Loop ---
        let lastTime = performance.now ? performance.now() : Date.now();
        function loop(time) {
            if (!loopRunning) return;
            requestAnimationFrame(loop);
            const currentTime = time || (performance.now ? performance.now() : Date.now());
            const rawDelta = (currentTime - lastTime) / 16.66;
            // WebView may occasionally skip a frame. Capping the physics step
            // prevents every fruit from teleporting below the screen at once.
            const delta = Math.min(2.0, Math.max(0.25, rawDelta));
            lastTime = currentTime;

            // Clear old trail history naturally based on time
            const now = Date.now();
            while (trailHistory.length > 0 && now - trailHistory[0].time > 150) {
                trailHistory.shift();
            }

            // Lerp hand position for ultra-smooth 60fps trails regardless of camera FPS
            if (isHandDetected && currentHandX !== -1) {
                currentHandX += (targetHandX - currentHandX) * 0.4;
                currentHandY += (targetHandY - currentHandY) * 0.4;

                if (trailHistory.length > 0) {
                    const lastPt = trailHistory[trailHistory.length - 1];
                    const dist = Math.hypot(currentHandX - lastPt.x, currentHandY - lastPt.y);
                    if (dist >= 10) {
                        trailHistory.push({ x: currentHandX, y: currentHandY, time: now });
                        if (trailHistory.length > maxHistoryLength) trailHistory.shift();
                        checkSlices();
                    } else {
                        // 距离不够时不更新 lastPt 的坐标，只更新时间！
                        // 这样累计移动距离达到阈值后才会真正生成一个新的拖尾节点，避免静止点堆积和长线断裂
                        lastPt.time = now;
                    }
                } else {
                    trailHistory.push({ x: currentHandX, y: currentHandY, time: now });
                }
            }

            // Clear screen
            ctx.clearRect(0, 0, w, h);
            // VFX: pulse + shockwaves + grid
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            const coreX = w * 0.5, coreY = h * 0.4;
            const pulseRadius = 150 + Math.sin(Date.now() * 0.003) * 20;
            const coreGrad = ctx.createRadialGradient(coreX, coreY, 0, coreX, coreY, pulseRadius);
            coreGrad.addColorStop(0, 'rgba(157, 0, 255, 0.5)');
            coreGrad.addColorStop(0.5, 'rgba(157, 0, 255, 0.1)');
            coreGrad.addColorStop(1, 'rgba(157, 0, 255, 0)');
            ctx.fillStyle = coreGrad; ctx.beginPath();
            ctx.arc(coreX, coreY, pulseRadius, 0, Math.PI * 2); ctx.fill();
            for (let i = shockwaves.length - 1; i >= 0; i--) {
                let sw = shockwaves[i];
                sw.radius += 25 * delta; sw.life -= 0.03 * delta;
                if (sw.life <= 0) { shockwaves.splice(i, 1); continue; }
                let cx = sw.x !== undefined ? sw.x : coreX, cy = sw.y !== undefined ? sw.y : coreY;
                ctx.strokeStyle = sw.color || `rgba(157, 0, 255, ${sw.life})`;
                if (sw.color) ctx.globalAlpha = sw.life;
                ctx.lineWidth = 6 * sw.life; ctx.beginPath();
                ctx.arc(cx, cy, sw.radius, 0, Math.PI * 2); ctx.stroke();
                ctx.globalAlpha = 1.0;
            }
            while (gridParticles.length < 20) {
                gridParticles.push({x: Math.random() * w, y: h - Math.random() * 200,
                    vx: (Math.random() - 0.5) * 0.5, vy: -1 - Math.random() * 2,
                    size: Math.random() * 3 + 1.5, life: Math.random(),
                    color: Math.random() > 0.5 ? '#00f0ff' : '#9d00ff'});
            }
            for (let p of gridParticles) {
                p.x += p.vx * delta; p.y += p.vy * delta; p.life -= 0.005 * delta;
                if (p.life <= 0 || p.y < h - 300) { p.y = h; p.x = Math.random() * w; p.life = 1.0; }
                ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            }
            ctx.restore();

            // Draw screen flash if active (e.g., from bomb)
            if (screenFlashAlpha > 0) {
                ctx.save();
                ctx.fillStyle = `rgba(255, 255, 255, ${screenFlashAlpha})`;
                ctx.fillRect(0, 0, w, h);
                ctx.restore();
                screenFlashAlpha -= 0.02 * delta; // fade out slowly
            }

            // Draw juice stains on background
            for (let i = juiceStains.length - 1; i >= 0; i--) {
                const s = juiceStains[i];
                const age = Date.now() - s.time;
                if (age > 5000) {
                    s.alpha -= 0.02 * delta;
                }
                if (s.alpha <= 0) {
                    juiceStains.splice(i, 1);
                    continue;
                }
                ctx.save();
                ctx.globalAlpha = s.alpha;
                ctx.shadowColor = s.color;
                ctx.shadowBlur = 8;
                ctx.fillStyle = s.color;
                ctx.translate(s.x, s.y);
                if (s.angle) ctx.rotate(s.angle);
                ctx.beginPath();
                ctx.scale(2.0, 0.5);
                ctx.arc(0, 0, s.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.scale(0.5, 2.0);
                let seed = Math.floor(s.x + s.y);
                for(let j=0; j<6; j++) {
                    seed = (seed * 9301 + 49297) % 233280;
                    let rand1 = seed / 233280;
                    seed = (seed * 9301 + 49297) % 233280;
                    let rand2 = seed / 233280;
                    ctx.beginPath();
                    ctx.arc((rand1 - 0.5) * s.radius * 6, (rand2 - 0.5) * s.radius * 2, rand1 * s.radius * 0.4, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            }

            // Spawn fruitsDraw and Update Fruits
            for (let i = fruits.length - 1; i >= 0; i--) {
                const f = fruits[i];
                f.vy += 0.4 * delta;
                f.x += f.vx * delta;
                f.y += f.vy * delta;
                f.rotation += f.rotSpeed * delta;

                if (f.y > h + 200) {
                    // Missing fruit only breaks the rhythm; it never ends a run.
                    fruits.splice(i, 1);
                    continue;
                }

                ctx.save();
                ctx.translate(f.x, f.y);
                ctx.rotate(f.rotation);
                if (!f.isBomb) {
                    ctx.save();
                    ctx.strokeStyle = '#00f0ff';
                    ctx.lineWidth = 3;
                    ctx.setLineDash([20, 10, 5, 10]);
                    ctx.rotate(-Date.now() * 0.003);
                    ctx.beginPath();
                    ctx.arc(0, 0, f.radius + 10, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.restore();
                    ctx.shadowColor = '#00f0ff';
                    ctx.shadowBlur = 15 + Math.sin(Date.now() * 0.01) * 8;
                }
                let img = IMAGES[f.type];
                if (img && img.complete && img.naturalWidth > 0) {
                    ctx.drawImage(img, -img.width/2, -img.height/2);
                }
                ctx.restore();
            }

            // Draw and Update Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx * delta;
                p.y += p.vy * delta;
                if (!p.isFlash && p.type !== 'blade-spark') {
                    p.vy += 0.5 * delta;
                    if (p.rotSpeed) p.rotation += p.rotSpeed * delta;
                }
                p.life -= (p.decay || 0.02) * delta;

                if (p.life <= 0) {
                    particles.splice(i, 1);
                    continue;
                }

                ctx.save();
                ctx.translate(p.x, p.y);
                if (p.rotation) ctx.rotate(p.rotation);
                
                if (p.type === 'juice') {
                    // Draw juice droplets
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.life / p.maxLife;
                    ctx.beginPath();
                    ctx.arc(0, 0, p.radius * (p.life / p.maxLife), 0, Math.PI * 2);
                    ctx.fill();
                } else if (p.type === 'blade-spark') {
                    // Draw neon blade sparks
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.life / p.maxLife;
                    ctx.beginPath();
                    ctx.arc(0, 0, p.radius * (p.life / p.maxLife), 0, Math.PI * 2);
                    ctx.fill();
                } else if (p.type === 'flash') {
                    // Flash image stretches out and fades
                    const img = IMAGES['flash'];
                    const scaleX = (1 - (p.life / p.maxLife)) * 3; // stretch along cut
                    const scaleY = (p.life / p.maxLife); // thin out
                    ctx.globalAlpha = p.life / p.maxLife;
                    if (img && img.complete) {
                        ctx.scale(scaleX, scaleY);
                        ctx.drawImage(img, -img.width / 2, -img.height / 2);
                    }
                } else {
                    const img = IMAGES[p.type];
                    if (img && img.complete) {
                        ctx.globalAlpha = p.life / p.maxLife;
                        const scale = p.scale || 1.0;
                        ctx.scale(scale, scale);
                        ctx.drawImage(img, -img.width / 2, -img.height / 2);
                    }
                }
                ctx.restore();
            }

            // Draw Blade (Neon Effect with Bezier Curves)
            if (trailHistory.length >= 2) {
                // Generate blade sparks based on head movement
                const head = trailHistory[trailHistory.length - 1];
                const neck = trailHistory[trailHistory.length - 2];
                const speed = Math.hypot(head.x - neck.x, head.y - neck.y);
                if (speed > 15 && Math.random() > 0.5) {
                    addParticle({
                        type: 'blade-spark',
                        x: head.x + (Math.random()-0.5)*10,
                        y: head.y + (Math.random()-0.5)*10,
                        vx: (Math.random() - 0.5) * 5,
                        vy: (Math.random() - 0.5) * 5,
                        radius: Math.random() * 3 + 1.5,
                        color: '#00ffff', // cyan sparks
                        life: 0.5,
                        maxLife: 0.5,
                        decay: 0.05
                    });
                }

                ctx.save();
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                
                // 闪电电弧
                if (Math.random() > 0.5) {
                    for(let k = 0; k < 2; k++) {
                        const pIndex = Math.floor(Math.random() * (trailHistory.length - 1));
                        const p1 = trailHistory[pIndex];
                        addParticle({type: 'trail-lightning', x: p1.x, y: p1.y, life: 0.2, maxLife: 0.2});
                    }
                }
                const layers = [
                    { width: 24, color: 'rgba(0, 220, 255, ', alphaMult: 0.2, blur: 20 },
                    { width: 10, color: 'rgba(0, 255, 255, ', alphaMult: 0.8, blur: 12 },
                    { width: 3,  color: 'rgba(255, 255, 255, ', alphaMult: 1.0, blur: 0 }
                ];

                layers.forEach(layer => {
                    ctx.beginPath();
                    // Move to the first point
                    ctx.moveTo(trailHistory[0].x, trailHistory[0].y);

                    // Use quadraticCurveTo for smooth spline interpolation
                    for (let i = 1; i < trailHistory.length - 1; i++) {
                        const p1 = trailHistory[i];
                        const p2 = trailHistory[i + 1];
                        // Midpoint between p1 and p2
                        const midX = (p1.x + p2.x) / 2;
                        const midY = (p1.y + p2.y) / 2;
                        
                        ctx.quadraticCurveTo(p1.x, p1.y, midX, midY);
                    }
                    // Connect the last point
                    const lastPt = trailHistory[trailHistory.length - 1];
                    ctx.lineTo(lastPt.x, lastPt.y);

                    // Gradient for fading tail
                    const grad = ctx.createLinearGradient(
                        trailHistory[0].x, trailHistory[0].y, 
                        lastPt.x, lastPt.y
                    );
                    grad.addColorStop(0, layer.color + '0)');
                    grad.addColorStop(1, layer.color + layer.alphaMult + ')');

                    ctx.lineWidth = layer.width;
                    ctx.strokeStyle = grad;
                    ctx.shadowColor = '#00f0ff';
                    ctx.shadowBlur = layer.blur;
                    ctx.stroke();
                });
                
                ctx.restore();
            }
        }

        requestAnimationFrame(loop);

        window.addEventListener('resize', () => {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        });
        
        console.log("Fruit Ninja HTML5 Canvas initialized.");
    </script>
</body>
</html>
